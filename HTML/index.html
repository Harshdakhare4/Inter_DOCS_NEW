<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatting tags</title>
</head>
<body>
    <!-- bold and header-->
   <b><h1>Hello Harsh!</h1></b>
   <h2><strong>Welcome to Cognizant</strong></h2>
   <!-- italic and underline -->
    <u><i>as a GEN-C intern.</i></u>
   
    <!-- strikethrough -->
   Your stipend is <s>12000</s> 10800.

   <!-- highlight and quotation -->
   <mark>Your EMP ID is <q>XYZ</q>.</mark>



</body>
</html>
