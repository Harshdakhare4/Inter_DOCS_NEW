    <div class="form">
        <form onsubmit="return checkForm() ">
         <label>Name:</label>   
         <input type="text" id="name" placeholder="Your Name" onblur="validateName()" ><br><br>
         <label>Emp-Id:</label>   
         <input type="text" placeholder="your EMP-ID" onchange="changed()"><br><br>
         <label>Cohort-Id:</label>   
         <input type="text" placeholder="Your Cohort-Id" ><br><br>
         <label>Phone no:</label>   
         <input type="text" placeholder="Your Phone" ><br><br>
         
        <button class="but" onclick="showMessage()">SUBMIT1</button>
        <button class="but" ondblclick="showMessage1()">SUBMIT2</button>
        <button class="but" onblur="showMessage1()">SUBMIT3</button>
        <button class="but"type="submit" onclick="CSSAnimation">SUBMIT4</button>
        </form>

<script>
    function showMessage(){
        alert("You have clicked once");
    }

     function showMessage1(){
        alert("You have double clicked once");
    }
    
function validateName() {
  alert("Input field lost focus");
}
function changed() {
  alert("Values have been changed.");
}
function checkForm(){
    if(document.getElementById("name").value === "") {
        alert("Name required");
        return false;
    }
    return true;
}
</script>
